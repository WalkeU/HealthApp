services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - healthapp_data:/data
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${FRONTEND_PROD_PORT}:80"
    environment:
      # nginx template needs BACKEND_PORT to proxy to the right backend port
      - BACKEND_PORT=${BACKEND_PORT}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  healthapp_data:
